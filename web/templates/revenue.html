<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revenue - Bot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <nav class="bg-gray-800 px-6 py-3 flex gap-6">
        <a href="/" class="text-gray-400 hover:text-white">Dashboard</a>
        <a href="/mailings" class="text-gray-400 hover:text-white">Mailings</a>
        <a href="/revenue" class="text-white font-bold">Revenue</a>
        <a href="/settings" class="text-gray-400 hover:text-white">Settings</a>
    </nav>

    <div class="container mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold mb-8">Revenue</h1>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-gray-800 rounded-lg p-6">
                <div class="text-gray-400 text-sm">Total Revenue</div>
                <div id="stat-total" class="text-3xl font-bold">-</div>
            </div>
            <div class="bg-yellow-900 rounded-lg p-6">
                <div class="text-yellow-300 text-sm">⭐ Telegram Stars</div>
                <div id="stat-stars" class="text-3xl font-bold">-</div>
            </div>
            <div class="bg-green-800 rounded-lg p-6">
                <div class="text-green-300 text-sm">💳 Rubles</div>
                <div id="stat-rub" class="text-3xl font-bold">-</div>
            </div>
            <div class="bg-blue-800 rounded-lg p-6">
                <div class="text-blue-300 text-sm">Conversion</div>
                <div id="stat-conversion" class="text-3xl font-bold">-</div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
            <div class="bg-gray-800 rounded-lg p-6">
                <h2 class="text-xl font-bold mb-4">Revenue by Month</h2>
                <canvas id="monthlyChart" height="150"></canvas>
            </div>
            <div class="bg-gray-800 rounded-lg p-6">
                <h2 class="text-xl font-bold mb-4">Revenue by Package</h2>
                <div id="packages-list" class="space-y-3"></div>
            </div>
        </div>

        <div class="bg-gray-800 rounded-lg p-6">
            <h2 class="text-xl font-bold mb-4">Recent Payments</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-gray-400 border-b border-gray-700">
                            <th class="py-2">User</th>
                            <th class="py-2">Package</th>
                            <th class="py-2">Amount</th>
                            <th class="py-2">Status</th>
                            <th class="py-2">Date</th>
                        </tr>
                    </thead>
                    <tbody id="payments-table"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function loadRevenue() {
            const res = await fetch('/api/revenue');
            const data = await res.json();
            document.getElementById('stat-stars').textContent = '⭐ ' + data.total_stars;
            document.getElementById('stat-rub').textContent = '₽' + data.total_rub;
            document.getElementById('stat-total').textContent = '⭐' + data.total_stars + ' / ₽' + data.total_rub;
            document.getElementById('stat-conversion').textContent = data.conversion + '% (' + data.premium_users + '/' + data.total_users + ')';
        }

        async function loadMonthly() {
            const res = await fetch('/api/revenue/monthly');
            const data = await res.json();
            const ctx = document.getElementById('monthlyChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: data.map(d => d.month),
                    datasets: [
                        { label: '⭐ Stars', data: data.map(d => d.stars), backgroundColor: '#eab308' },
                        { label: '₽ Rubles', data: data.map(d => d.rub), backgroundColor: '#22c55e' },
                    ]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { labels: { color: '#fff' } } },
                    scales: {
                        x: { grid: { color: '#374151' } },
                        y: { grid: { color: '#374151' } }
                    }
                }
            });
        }

        async function loadPackages() {
            const res = await fetch('/api/revenue/packages');
            const data = await res.json();
            const container = document.getElementById('packages-list');
            container.innerHTML = data.map(p =>
                '<div class="flex justify-between items-center bg-gray-700 rounded p-3">' +
                    '<div>' +
                        '<div class="font-bold">' + p.name + '</div>' +
                        '<div class="text-sm text-gray-400">' + p.count + ' sales</div>' +
                    '</div>' +
                    '<div class="text-right">' +
                        '<div class="font-bold">' + p.percentage + '%</div>' +
                        '<div class="text-sm text-gray-400">⭐' + p.total + '</div>' +
                    '</div>' +
                '</div>'
            ).join('');
        }

        async function loadRecent() {
            const res = await fetch('/api/revenue/recent');
            const data = await res.json();
            const tbody = document.getElementById('payments-table');
            tbody.innerHTML = data.map(p =>
                '<tr class="border-b border-gray-700">' +
                    '<td class="py-2">' + p.user + '</td>' +
                    '<td class="py-2">' + p.package + '</td>' +
                    '<td class="py-2">' + (p.currency === 'stars' ? '⭐' : '₽') + p.amount + '</td>' +
                    '<td class="py-2"><span class="px-2 py-1 rounded text-xs ' +
                        (p.status === 'completed' ? 'bg-green-800' : 'bg-yellow-800') + '">' + p.status + '</span></td>' +
                    '<td class="py-2">' + new Date(p.created_at).toLocaleDateString() + '</td>' +
                '</tr>'
            ).join('');
        }

        loadRevenue();
        loadMonthly();
        loadPackages();
        loadRecent();
    </script>
</body>
</html>
